<script>
// --- Calendario avanzado tipo Loyverse ---
function getHoy() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function getAyer() {
  const d = new Date(); d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
function getSemana() {
  const d = new Date();
  const day = d.getDay() || 7;
  const inicio = new Date(d); inicio.setDate(d.getDate() - day + 1);
  const fin = new Date(d); fin.setDate(inicio.getDate() + 6);
  return [inicio.toISOString().slice(0,10), fin.toISOString().slice(0,10)];
}
function getUltimos7() {
  const d = new Date();
  const fin = d.toISOString().slice(0,10);
  const inicio = new Date(d); inicio.setDate(d.getDate()-6);
  return [inicio.toISOString().slice(0,10), fin];
}
function getMes() {
  const d = new Date();
  const inicio = new Date(d.getFullYear(), d.getMonth(), 1);
  const fin = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  return [inicio.toISOString().slice(0,10), fin.toISOString().slice(0,10)];
}
function getUltimos30() {
  const d = new Date();
  const fin = d.toISOString().slice(0,10);
  const inicio = new Date(d); inicio.setDate(d.getDate()-29);
  return [inicio.toISOString().slice(0,10), fin];
}
document.addEventListener('DOMContentLoaded', function() {
  const btnDropdown = document.getElementById('btnCalendarDropdown');
  const dropdown = document.getElementById('calendarDropdown');
  const label = document.getElementById('calendarLabel');
  const customRange = document.getElementById('calendarCustomRange');
  const btnOk = document.getElementById('btnCalendarOk');
  let selectedRange = 'hoy';
  let fechaInicio = document.getElementById('filtroFechaInicio');
  let fechaFin = document.getElementById('filtroFechaFin');
  let quickBtns = document.querySelectorAll('.btnQuickDate');
  // Mostrar/ocultar dropdown
  btnDropdown.addEventListener('click', function(e) {
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    if (selectedRange === 'personalizado') {
      customRange.style.display = 'block';
      setTimeout(()=>{fechaInicio.focus();fechaInicio.showPicker&&fechaInicio.showPicker();},100);
    }
    e.stopPropagation();
  });
  document.addEventListener('click', function(e) {
    if (!dropdown.contains(e.target) && e.target !== btnDropdown) dropdown.style.display = 'none';
  });
  // Opciones rápidas
  quickBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      selectedRange = btn.dataset.range;
      label.textContent = btn.textContent;
      quickBtns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedRange === 'hoy') {
        fechaInicio.value = fechaFin.value = getHoy();
        customRange.style.display = 'none';
      } else if (selectedRange === 'ayer') {
        fechaInicio.value = fechaFin.value = getAyer();
        customRange.style.display = 'none';
      } else if (selectedRange === 'semana') {
        const [ini, fin] = getSemana();
        fechaInicio.value = ini; fechaFin.value = fin;
        customRange.style.display = 'none';
      } else if (selectedRange === 'ult7') {
        const [ini, fin] = getUltimos7();
        fechaInicio.value = ini; fechaFin.value = fin;
        customRange.style.display = 'none';
      } else if (selectedRange === 'mes') {
        const [ini, fin] = getMes();
        fechaInicio.value = ini; fechaFin.value = fin;
        customRange.style.display = 'none';
      } else if (selectedRange === 'ult30') {
        const [ini, fin] = getUltimos30();
        fechaInicio.value = ini; fechaFin.value = fin;
        customRange.style.display = 'none';
      } else if (selectedRange === 'personalizado') {
        customRange.style.display = 'block';
        setTimeout(()=>{fechaInicio.focus();fechaInicio.showPicker&&fechaInicio.showPicker();},100);
      }
    });
  });
  btnOk.addEventListener('click', function() {
    dropdown.style.display = 'none';
    renderHistorialVentasFodexa();
  });
  // Si cambia el input personalizado, actualizar label
  fechaInicio.addEventListener('change', function() { label.textContent = 'Personalizado'; selectedRange = 'personalizado'; });
  fechaFin.addEventListener('change', function() { label.textContent = 'Personalizado'; selectedRange = 'personalizado'; });
  // Eliminar botón limpiar si existe
  const btnLimpiar = document.getElementById('btnCalendarClear');
  if (btnLimpiar) btnLimpiar.remove();
});
</script>

<script>
// --- HISTORIAL DE VENTAS: FILTROS Y VISUALIZACIÓN ---
function renderHistorialVentasFodexa() {
  const cont = document.getElementById('contenedor-historial-ventas');
  if (!cont) return;
  let historial = [];
  try { historial = JSON.parse(localStorage.getItem('historialVentasFodexa') || '[]'); } catch(e) { historial = []; }
  // Obtener filtros
  const filtroProveedor = (document.getElementById('filtroProveedor')?.value || '').trim().toLowerCase();
  const filtroProducto = (document.getElementById('filtroProducto')?.value || '').trim().toLowerCase();
  const fechaInicio = document.getElementById('filtroFechaInicio')?.value;
  const fechaFin = document.getElementById('filtroFechaFin')?.value;
  // Filtrar
  let filtrados = historial.filter(item => {
    let ok = true;
    // Proveedor
    if (filtroProveedor) {
      ok = ok && (item.proveedor || '').toLowerCase().includes(filtroProveedor);
    }
    // Producto
    if (filtroProducto) {
      ok = ok && (item.productos || []).some(p => (p.nombre || '').toLowerCase().includes(filtroProducto));
    }
    // Fechas
    if (fechaInicio && fechaFin) {
      let fechaItem = (item.fecha || '').split(' ')[0].split('/').reverse().join('-');
      ok = ok && (fechaItem >= fechaInicio && fechaItem <= fechaFin);
    }
    return ok;
  });
  // Ordenar descendente por fecha (más reciente arriba)
  filtrados.sort((a, b) => (b.id || '').localeCompare(a.id || ''));
  cont.innerHTML = '';
  if (!filtrados.length) {
    cont.innerHTML = '<div style="color:#fff;opacity:0.7;padding:24px;text-align:center;">No se encontraron pedidos con esos criterios.</div>';
    return;
  }
  filtrados.forEach(item => {
    const card = document.createElement('div');
    card.className = 'historial-card';
    card.innerHTML = `
      <div class="historial-titulo"><i class='fas fa-truck'></i> ${item.proveedor || 'Proveedor'}</div>
      <div class="historial-fecha"><i class='fas fa-calendar'></i> ${item.fecha || ''}</div>
      <div class="historial-hora"><i class='fas fa-clock'></i> ${item.horaEntrega || ''}</div>
      <div class="historial-direccion"><i class='fas fa-map-marker-alt'></i> ${item.direccion || ''}</div>
      <i class="fas fa-chevron-down"></i><i class="fas fa-chevron-up"></i>
      <div class="historial-productos">
        <b>Productos:</b>
        <ul>
          ${(item.productos||[]).map(p => `<li>${p.nombre} <span style='color:#60a5fa;'>(x${p.cantidad})</span></li>`).join('')}
        </ul>
      </div>
    `;
    card.addEventListener('click', function(e) {
      if (e.target.classList.contains('fa-chevron-down') || e.target.classList.contains('fa-chevron-up') || e.target.classList.contains('historial-card')) {
        card.classList.toggle('expanded');
      }
    });
    cont.appendChild(card);
  });
}
// Eventos de filtros
document.addEventListener('DOMContentLoaded', function() {
  const filtros = ['filtroProveedor','filtroProducto','filtroRangoFecha','filtroFechaInicio','filtroFechaFin'];
  filtros.forEach(id => {
    const el = document.getElementById(id);
    if (el && id !== 'filtroRangoFecha') el.addEventListener('input', function(e) {
      // Solo buscar si es personalizado o si cambia texto
      if (document.getElementById('filtroRangoFecha').value === 'personalizado' || id !== 'filtroFechaInicio' && id !== 'filtroFechaFin') {
        renderHistorialVentasFodexa();
      }
    });
    if (el && id === 'filtroRangoFecha') el.addEventListener('change', function() {
      aplicarRangoFecha();
      // Solo buscar si no es personalizado
      if (el.value !== 'personalizado') renderHistorialVentasFodexa();
    });
  });
  // Lógica del botón Limpiar eliminada por solicitud
  // Render inicial
  renderHistorialVentasFodexa();
  // Si la sección historial se muestra, refrescar
  const comprasSection = document.getElementById('seccion-compras');
  if (comprasSection) {
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.attributeName === 'class') {
          if (!comprasSection.classList.contains('hidden')) renderHistorialVentasFodexa();
        }
      });
    });
    observer.observe(comprasSection, { attributes: true });
  }
});
</script>

<script>
const LS_PROVEEDORES_KEY = 'fodexa_proveedores';

function guardarProveedor() {
  const form = document.getElementById('proveedor-form');
  if (!form) return;
  const nombre = form.nombreProveedor.value.trim();
  const telefono = form.telefonoProveedor.value.trim();
  const whatsapp = form.whatsappProveedor.value.trim();
  // Validación: nombre obligatorio y al menos uno de teléfono o WhatsApp
  if (!nombre) {
    alert('El nombre del proveedor es obligatorio.');
    return;
  }
  if (!telefono && !whatsapp) {
    alert('Debes ingresar al menos un teléfono o WhatsApp.');
    return;
  }
  const proveedor = {
    id: 'prov_' + Date.now(),
    nombre: nombre,
    contacto: form.nombreContacto.value.trim(),
    telefono: telefono,
    whatsapp: whatsapp,
    email: form.emailProveedor.value.trim(),
    direccion: form.direccionProveedor.value.trim(),
    ciudad: form.ciudadProveedor.value.trim(),
    web: form.webProveedor.value.trim()
  };
  let proveedores = JSON.parse(localStorage.getItem(LS_PROVEEDORES_KEY) || '[]');
  proveedores.push(proveedor);
  localStorage.setItem(LS_PROVEEDORES_KEY, JSON.stringify(proveedores));
  mostrarProveedores();
}

function mostrarProveedores(filtro = '') {
  const contenedor = document.getElementById('proveedores-container');
  if (!contenedor) return;
  let proveedores = JSON.parse(localStorage.getItem(LS_PROVEEDORES_KEY) || '[]');
  if (filtro) {
    const f = filtro.toLowerCase();
    proveedores = proveedores.filter(p =>
      p.nombre.toLowerCase().includes(f) ||
      p.ciudad.toLowerCase().includes(f)
    );
  }
  contenedor.innerHTML = '';
  if (proveedores.length === 0) {
    contenedor.innerHTML = '<div style="color:#fff;opacity:0.7;padding:24px;">No hay proveedores registrados.</div>';
    return;
  }
  proveedores.forEach(p => {
    const card = document.createElement('div');
    card.className = 'proveedor-card';
    card.innerHTML = `
      <div class="proveedor-card-header">
        <span class="proveedor-nombre"><i class="fas fa-truck"></i> ${p.nombre}</span>
        <button class="proveedor-toggle-btn" title="Ver más" tabindex="0"><i class="fas fa-chevron-down"></i></button>
      </div>
      <div class="proveedor-card-body" style="display:none;">
        <div class="proveedor-info"><i class="fas fa-user"></i> ${p.contacto}</div>
        <div class="proveedor-info"><i class="fas fa-phone"></i> ${p.telefono}</div>
        <div class="proveedor-info"><i class="fab fa-whatsapp"></i> ${p.whatsapp}</div>
        <div class="proveedor-info"><i class="fas fa-map-marker-alt"></i> ${p.direccion}</div>
        <div class="proveedor-info"><i class="fas fa-envelope"></i> ${p.email}</div>
        <div class="proveedor-info"><i class="fas fa-city"></i> ${p.ciudad}</div>
        ${p.web ? `<div class="proveedor-info"><i class="fas fa-globe"></i> <a href="${p.web}" target="_blank" style="color:#fff;text-decoration:underline;">${p.web}</a></div>` : ''}
      </div>
    `;
    // Toggle expand/collapse
    const header = card.querySelector('.proveedor-card-header');
    const toggleBtn = card.querySelector('.proveedor-toggle-btn');
    const body = card.querySelector('.proveedor-card-body');
    function toggleCard(e) {
      e.stopPropagation();
      const expanded = body.style.display === 'block';
      body.style.display = expanded ? 'none' : 'block';
      toggleBtn.querySelector('i').classList.toggle('fa-chevron-down', expanded);
      toggleBtn.querySelector('i').classList.toggle('fa-chevron-up', !expanded);
      card.classList.toggle('expanded', !expanded);
    }
    header.addEventListener('click', toggleCard);
    toggleBtn.addEventListener('click', toggleCard);
    contenedor.appendChild(card);
  });
}

function filtrarProveedores() {
  const input = document.getElementById('busqueda-input');
  if (!input) return;
  input.addEventListener('input', function() {
    mostrarProveedores(input.value.trim());
  });
}

// Inicialización al cargar la página
window.addEventListener('DOMContentLoaded', function() {
  mostrarProveedores();
  filtrarProveedores();
  const form = document.getElementById('proveedor-form');
  if (form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      guardarProveedor();
      form.reset();
      document.getElementById('modal-proveedor').style.display = 'none';
      // Notificar a inventario que hay nuevos proveedores
      window.dispatchEvent(new CustomEvent('proveedoresActualizados'));
    });
  }
});
</script>

    if (!selectProveedor) return;

    var proveedores = [];
    try {
      proveedores = JSON.parse(localStorage.getItem('fodexa_proveedores') || '[]');
    } catch(e) { proveedores = []; }
    if (!proveedores || proveedores.length === 0) {
      var opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'Sin proveedores registrados';
      opt.disabled = true;
      opt.selected = true;
      selectProveedor.appendChild(opt);
      selectProveedor.setAttribute('disabled', 'disabled');
    } else {
      proveedores.forEach(function(p, idx) {
        var opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.nombre;
        selectProveedor.appendChild(opt);
      });
      selectProveedor.removeAttribute('disabled');
    }
  }

  // Mostrar modal solo al hacer clic en el botón
  if (btnAbrirIngrediente && modalIngrediente) {
    btnAbrirIngrediente.addEventListener('click', function() {
      var seccionIngredientes = document.getElementById('seccion-ingredientes');
      if (seccionIngredientes && seccionIngredientes.classList.contains('visible')) {
        cargarProveedoresEnSelect();
        modalIngrediente.style.display = 'flex';
      }
    });
  }

  // Cerrar modal por botón cerrar
  if (btnCerrarIngrediente && modalIngrediente) {
    btnCerrarIngrediente.addEventListener('click', function(e) {
      modalIngrediente.style.display = 'none';
    });
  }

  // Cerrar modal por botón cancelar
  if (btnCancelarIngrediente && modalIngrediente) {
    btnCancelarIngrediente.addEventListener('click', function(e) {
      modalIngrediente.style.display = 'none';
    });
  }

  // Cerrar modal al hacer clic fuera del contenido del modal
  if (modalIngrediente) {
    modalIngrediente.addEventListener('click', function(e) {
      if (e.target === modalIngrediente) {
        modalIngrediente.style.display = 'none';
      }
    });
  }

  // Submit ingrediente
  if (formIngrediente && modalIngrediente) {
    formIngrediente.addEventListener('submit', function(e) {
      e.preventDefault();
      const datos = {
        nombre: formIngrediente.nombreIngrediente.value.trim(),
        proveedorId: selectProveedor && !selectProveedor.disabled ? selectProveedor.value : '',
        tipoMedida: formIngrediente.tipoMedida.value,
        cantidadEmpaque: formIngrediente.cantidadEmpaque.value,
        precioEmpaque: formIngrediente.precioEmpaque.value,
        merma: formIngrediente.merma.value
      };
      var ingredientes = [];
      try {
        ingredientes = JSON.parse(localStorage.getItem('ingredientesFodexa') || '[]');
      } catch(e) { ingredientes = []; }
      if (indiceEditando !== null && !isNaN(indiceEditando) && ingredientes[indiceEditando]) {
        // Actualizar ingrediente
        ingredientes[indiceEditando] = datos;
        localStorage.setItem('ingredientesFodexa', JSON.stringify(ingredientes));
        indiceEditando = null;
        // Restaurar texto del botón
        var btnGuardar = formIngrediente.querySelector('.btn-primary');
        if (btnGuardar) {
          btnGuardar.textContent = 'Guardar ingrediente';
        }
      } else {
        // Nuevo ingrediente
        guardarIngrediente(datos);
      }
      mostrarIngredientes();
      formIngrediente.reset();
      modalIngrediente.style.display = 'none';
    });
  }

  // Mostrar ingredientes al cargar la sección
  mostrarIngredientes();

  // Asegura que el modal de ingredientes esté oculto al cargar
  if (modalIngrediente) {
    modalIngrediente.style.display = 'none';
  }
});
</script>

      if (!comprasSection.classList.contains('hidden') && typeof window.refrescarPedidosCompras === 'function') {
        window.refrescarPedidosCompras();
      }
      // También refrescar cada vez que se muestre la sección
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          if (m.attributeName === 'class') {
            if (!comprasSection.classList.contains('hidden') && typeof window.refrescarPedidosCompras === 'function') {
              window.refrescarPedidosCompras();
            }
          }
        });
      });
      observer.observe(comprasSection, { attributes: true });
    }
  });
})();
</script>

// --- LÓGICA DE PEDIDOS FODEXA ---
document.addEventListener('DOMContentLoaded', function() {
  // 1. Agregar columna Stock Faltante y mostrar botón Generar Pedido si corresponde
  if (typeof window.mostrarInventario === 'function') {
    const originalMostrarInventario = window.mostrarInventario;
    window.mostrarInventario = function() {
      originalMostrarInventario();
      // Agregar columna Stock Faltante
      const tabla = document.querySelector('#inventario-listado .ingredientes-table');
      if (!tabla) return;
      // Encabezado
      const header = tabla.querySelector('.ingredientes-table-header');
      if (header && !header.querySelector('.col-stock-faltante')) {
        const col = document.createElement('div');
        col.className = 'col-stock-faltante';
        col.style.flex = '0.9';
        col.style.minWidth = '90px';
        col.style.textAlign = 'center';
        col.textContent = 'Stock Faltante';
        header.appendChild(col);
      }
      // Filas
      let hayFaltante = false;
      const filas = tabla.querySelectorAll('.ingredientes-table-row');
      filas.forEach(function(fila) {
        if (fila.querySelector('.col-stock-faltante')) return;
        const nombre = fila.querySelector('[data-nombre]') ? fila.querySelector('[data-nombre]').getAttribute('data-nombre') : null;
        let stockActual = 0, stockMin = 0;
        const inputStock = fila.querySelector('.input-stock-actual');
        const inputMin = fila.querySelector('.input-stock-minimo');
        if (inputStock) stockActual = parseFloat(inputStock.value) || 0;
        if (inputMin) stockMin = parseFloat(inputMin.value) || 0;
        const faltante = Math.max(stockMin - stockActual, 0);
        const col = document.createElement('div');
        col.className = 'col-stock-faltante';
        col.style.flex = '0.9';
        col.style.minWidth = '90px';
        col.style.textAlign = 'center';
        col.style.fontWeight = '600';
        col.style.color = faltante > 0 ? '#ef4444' : '#222';
        col.textContent = faltante > 0 ? faltante : '';
        if (faltante > 0) hayFaltante = true;
        fila.appendChild(col);
      });
      // Mostrar/ocultar botón Generar Pedido
      const btnPedido = document.getElementById('btn-generar-pedido');
      if (btnPedido) btnPedido.style.display = hayFaltante ? 'inline-block' : 'none';
    };
    // Refrescar tabla al cargar
    window.mostrarInventario();
  }

  // 2. Lógica para Generar Pedido
  const btnPedido = document.getElementById('btn-generar-pedido');
  const modalPedido = document.getElementById('modal-pedido');
  const btnCerrarModal = document.getElementById('btn-cerrar-modal-pedido');
  const pedidoMensaje = document.getElementById('pedido-mensaje');
  const horaEntrega = document.getElementById('hora-entrega');
  const btnCopiar = document.getElementById('btn-copiar-mensaje');
  const btnWhatsapp = document.getElementById('btn-enviar-whatsapp');
  window.pedidoActual = null;
  // Modal de aviso para selección de proveedor
  let modalAviso = document.getElementById('modal-aviso-proveedor');
  if (!modalAviso) {
    modalAviso = document.createElement('div');
    modalAviso.id = 'modal-aviso-proveedor';
    modalAviso.style = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.35);display:none;z-index:3000;align-items:center;justify-content:center;';
    modalAviso.innerHTML = `<div style='background:#fff;padding:32px 24px 18px 24px;border-radius:18px;box-shadow:0 4px 24px #0002;max-width:340px;width:90vw;text-align:center;'><div style='font-size:1.2em;margin-bottom:18px;color:#ef4444;'><i class='fas fa-exclamation-triangle'></i> Debes seleccionar primero el proveedor para el pedido.</div><button id='btn-aceptar-aviso-proveedor' class='btn btn-primary' style='padding:8px 22px;border-radius:8px;font-size:1em;margin-top:8px;'>Aceptar</button></div>`;
    document.body.appendChild(modalAviso);
    document.getElementById('btn-aceptar-aviso-proveedor').onclick = function() {
      modalAviso.style.display = 'none';
    };
  }

  function obtenerIngredientesFaltantes() {
    // Lee ingredientes y proveedores
    let ingredientes = [];
    try { ingredientes = JSON.parse(localStorage.getItem('ingredientesFodexa') || '[]'); } catch(e) { ingredientes = []; }
    let proveedores = [];
    try { proveedores = JSON.parse(localStorage.getItem('fodexa_proveedores') || '[]'); } catch(e) { proveedores = []; }
    const provMap = {};
    proveedores.forEach(p => { provMap[p.id] = p; });
    // Usar los valores actuales de los inputs visibles en la tabla
    const filas = document.querySelectorAll('.ingredientes-table-row');
    const faltantesPorProveedor = {};
    filas.forEach(fila => {
      const inputStock = fila.querySelector('.input-stock-actual');
      const inputMin = fila.querySelector('.input-stock-minimo');
      if (!inputStock || !inputMin) return;
      const nombre = inputStock.getAttribute('data-nombre');
      if (!nombre) return;
      let ing = ingredientes.find(i => i.nombre === nombre);
      if (!ing) return;
      const actual = parseFloat(inputStock.value) || 0;
      const minimo = parseFloat(inputMin.value) || 0;
      const faltante = Math.max(minimo - actual, 0);
      if (faltante > 0) {
        const provId = ing.proveedorId || 'sin_proveedor';
        if (!faltantesPorProveedor[provId]) faltantesPorProveedor[provId] = [];
        faltantesPorProveedor[provId].push({
          nombre: ing.nombre,
          cantidad: faltante,
          medida: ing.tipoMedida,
          proveedor: provMap[provId] || null
        });
      }
    });
    return faltantesPorProveedor;
  }

  function construirMensajePedido(provObj, hora, fecha) {
    let msg = `Hola, por favor preparar el siguiente pedido para Roal Burger:`;
    provObj.productos.forEach(prod => {
      msg += `\n📦 Producto: ${prod.nombre}\n🔢 Cantidad: ${prod.cantidad} ${prod.medida}`;
    });
    // Dirección fija de entrega
    msg += `\n\n📍 Dirección: LAS AMERICAS, CALLE 22 #29-59`;
    // Formatear hora a AM/PM si existe
    let horaFormateada = '[__________]';
    if (hora) {
      const [h, m] = hora.split(':');
      let hour = parseInt(h, 10);
      const min = m;
      let ampm = 'AM';
      if (hour >= 12) {
        ampm = 'PM';
        if (hour > 12) hour -= 12;
      }
      if (hour === 0) hour = 12;
      horaFormateada = `${hour}:${min} ${ampm}`;
    }
    let fechaEntrega = '[__________]';
    if (fecha) {
      const [yy, mm, dd] = fecha.split('-');
      fechaEntrega = `${dd}/${mm}/${yy}`;
    }
    msg += `\n📅 Fecha de entrega: ${fechaEntrega}`;
    msg += `\n🕓 Hora: ${horaFormateada}`;
    return msg;
  }

  let pedidosPorProveedor = [];
  let proveedorActualIdx = 0;

  function mostrarModalPedido() {
    const faltantes = obtenerIngredientesFaltantes();
    pedidosPorProveedor = [];
    Object.keys(faltantes).forEach(provId => {
      const productos = faltantes[provId];
      const proveedor = productos[0].proveedor || null;
      pedidosPorProveedor.push({
        proveedor: proveedor,
        productos: productos
      });
    });
    // Si hay más de un proveedor, mostrar aviso y no continuar
    if (pedidosPorProveedor.length > 1) {
      modalAviso.style.display = 'flex';
      return;
    }
    if (pedidosPorProveedor.length === 0) return;
    proveedorActualIdx = 0;
    renderPedidoProveedor();
    if (modalPedido) modalPedido.style.display = 'flex';
  }

  function renderPedidoProveedor() {
    const pedido = pedidosPorProveedor[proveedorActualIdx];
    if (!pedido) return;
    const hora = horaEntrega ? horaEntrega.value : '';
    const fecha = document.getElementById('fecha-entrega') ? document.getElementById('fecha-entrega').value : '';
    pedidoActual = pedido;
    // Mostrar el nombre del proveedor en el título del modal
    const titulo = document.getElementById('titulo-modal-pedido');
    if (titulo) {
      let nombreProv = (pedido.proveedor && pedido.proveedor.nombre) ? pedido.proveedor.nombre : 'Sin proveedor';
      titulo.innerHTML = `<i class='fas fa-truck'></i> Pedido a Proveedor: <span style='color:#22d3ee;'>${nombreProv}</span>`;
    }
    pedidoMensaje.textContent = construirMensajePedido(pedido, hora, fecha);
  }

  if (btnPedido) {
    btnPedido.addEventListener('click', function() {
      mostrarModalPedido();
    });
  }
  if (btnCerrarModal && modalPedido) {
    btnCerrarModal.addEventListener('click', function() {
      modalPedido.style.display = 'none';
    });
    modalPedido.addEventListener('click', function(e) {
      if (e.target === modalPedido) modalPedido.style.display = 'none';
    });
  }
  if (horaEntrega) {
    horaEntrega.addEventListener('input', function() {
      renderPedidoProveedor();
    });
  }
  if (btnCopiar) {
    btnCopiar.addEventListener('click', function() {
      if (pedidoMensaje && pedidoMensaje.textContent) {
        navigator.clipboard.writeText(pedidoMensaje.textContent);
        btnCopiar.textContent = '¡Copiado!';
        setTimeout(()=>{btnCopiar.textContent = 'Copiar mensaje';}, 1200);
      }
    });
  }
  if (btnWhatsapp) {
    btnWhatsapp.addEventListener('click', function() {
      if (!pedidoActual || !pedidoActual.proveedor || !pedidoActual.proveedor.telefono) return;
      let tel = pedidoActual.proveedor.telefono.replace(/[^\d]/g, '');
      if (tel.length < 8) return;
      let msg = encodeURIComponent(pedidoMensaje.textContent);
      let url = `https://wa.me/57${tel}?text=${msg}`;
      window.open(url, '_blank');
    });
  }

  // Guardar pedido en localStorage al abrir modal
  function guardarPedidoPendiente() {
    if (!pedidoActual || !pedidoActual.proveedor) return;
    let pedidos = {};
    try { pedidos = JSON.parse(localStorage.getItem('pedidosPendientesFodexa') || '{}'); } catch(e) { pedidos = {}; }
    const fecha = new Date().toISOString().slice(0,10);
    const provId = pedidoActual.proveedor.id || 'sin_proveedor';
    if (!pedidos[fecha]) pedidos[fecha] = {};
    pedidos[fecha][provId] = {
      proveedor: pedidoActual.proveedor,
      productos: pedidoActual.productos,
      horaEntrega: horaEntrega ? horaEntrega.value : ''
    };
    localStorage.setItem('pedidosPendientesFodexa', JSON.stringify(pedidos));
  }
  if (modalPedido) {
    modalPedido.addEventListener('transitionend', function() {
      if (modalPedido.style.display === 'flex') guardarPedidoPendiente();
    });
    // fallback: guardar al mostrar
    if (btnPedido) btnPedido.addEventListener('click', guardarPedidoPendiente);
    // Botón Registrar: guardar pedido y cerrar modal
    const btnRegistrarPedido = document.getElementById('btn-registrar-pedido');
    if (btnRegistrarPedido) {
      btnRegistrarPedido.addEventListener('click', function() {
        if (!pedidoActual || !pedidoActual.proveedor) return;
        let pedidos = {};
        try { pedidos = JSON.parse(localStorage.getItem('pedidosPendientesFodexa') || '{}'); } catch(e) { pedidos = {}; }
        const fecha = new Date().toISOString().slice(0,10);
        const provId = pedidoActual.proveedor.id || 'sin_proveedor';
        if (!pedidos[fecha]) pedidos[fecha] = {};
        pedidos[fecha][provId] = {
          proveedor: pedidoActual.proveedor,
          productos: pedidoActual.productos,
          horaEntrega: horaEntrega ? horaEntrega.value : ''
        };
        localStorage.setItem('pedidosPendientesFodexa', JSON.stringify(pedidos));
        // Cerrar el modal
        modalPedido.style.display = 'none';
        // Aviso de registro exitoso
        alert('¡Registro exitoso!');
        // Opcional: refrescar sección Compras si está visible
        const comprasSection = document.getElementById('seccion-compras');
        if (comprasSection && !comprasSection.classList.contains('hidden')) {
          if (typeof window.refrescarPedidosCompras === 'function') {
            window.refrescarPedidosCompras();
          }
        }
      });
    }
  }
});
</script>
<script>
// --- PEDIDOS DE COMPRAS FODEXA ---
(function() {
  // Guardar pedido de compras al registrar
  const btnRegistrarPedido = document.getElementById('btn-registrar-pedido');
  const modalPedido = document.getElementById('modal-pedido');
  const horaEntrega = document.getElementById('hora-entrega');
  if (btnRegistrarPedido && modalPedido) {
    btnRegistrarPedido.addEventListener('click', function() {
      if (!window.pedidoActual || !window.pedidoActual.proveedor) return;
      let pedidos = [];
      try { pedidos = JSON.parse(localStorage.getItem('pedidosComprasFodexa') || '[]'); } catch(e) { pedidos = []; }
      const fecha = new Date().toISOString().slice(0,10);
      const hora = horaEntrega ? horaEntrega.value : '';
      const pedidoObj = {
        id: 'pedido_' + Date.now(),
        proveedor: window.pedidoActual.proveedor.nombre || 'Sin proveedor',
        productos: (window.pedidoActual.productos || []).map(p => ({ nombre: p.nombre, cantidad: p.cantidad, medida: p.medida })),
        direccion: 'Roal Burger - Avenida Las Américas, calle 22 #29-59',
        fecha: fecha,
        horaEntrega: hora
      };
      pedidos.push(pedidoObj);
      localStorage.setItem('pedidosComprasFodexa', JSON.stringify(pedidos));
      // Aviso de registro exitoso
      alert('¡Registro exitoso!');
      modalPedido.style.display = 'none';
      // Refrescar sección Compras si está visible
      const comprasSection = document.getElementById('seccion-compras');
      if (comprasSection && !comprasSection.classList.contains('hidden')) {
        if (typeof window.refrescarPedidosCompras === 'function') {
          window.refrescarPedidosCompras();
        }
      }
    });
  }

  // Refrescar pedidos de compras al abrir sección Compras
  document.addEventListener('DOMContentLoaded', function() {
    const comprasSection = document.getElementById('seccion-compras');
    if (!comprasSection) return;
    const menuBtns = document.querySelectorAll('.menu-btn');
    menuBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        const destino = btn.getAttribute('data-section');
        if (destino === 'compras') {
          window.refrescarPedidosCompras();
        }
      });
    });
  });

  // Función global para refrescar pedidos de compras
  window.refrescarPedidosCompras = function() {
    const cont = document.getElementById('contenedor-pedidos-compras');
    if (!cont) return;
    let pedidos = [];
    try { pedidos = JSON.parse(localStorage.getItem('pedidosComprasFodexa') || '[]'); } catch(e) { pedidos = []; }
    cont.innerHTML = '';
    if (pedidos.length === 0) {
      cont.innerHTML = '<div style="color:#fff;opacity:0.7;padding:24px;text-align:center;">No hay pedidos registrados.</div>';
      return;
    }
    // --- CSS visual moderno para tarjetas de compras ---
    if (!document.getElementById('compras-tarjeta-css')) {
      const style = document.createElement('style');
      style.id = 'compras-tarjeta-css';
      style.textContent = `
        #contenedor-pedidos-compras {
          display: flex;
          flex-wrap: wrap;
          gap: 20px;
          align-items: flex-start;
          margin-top: 18px;
        }
        .compra-card {
          background: #1f2937;
          color: #fff;
          font-family: 'Inter', sans-serif;
          border-radius: 16px;
          box-shadow: 0 4px 18px #0003;
          padding: 18px 20px 16px 20px;
          min-width: 270px;
          max-width: 340px;
          width: 100%;
          display: flex;
          flex-direction: column;
          gap: 10px;
          position: relative;
          transition: box-shadow 0.18s, border 0.18s;
        }
        .compra-card .compra-titulo {
          font-size: 1.13em;
          font-weight: 700;
          margin-bottom: 2px;
          color: #3b82f6;
          letter-spacing: 0.5px;
        }
        .compra-card .compra-productos-box {
          background: #374151;
          border-radius: 10px;
          padding: 10px 12px 8px 12px;
          margin-bottom: 4px;
        }
        .compra-card .compra-productos-box ul {
          margin: 0;
          padding: 0 0 0 12px;
        }
        .compra-card .compra-productos-box li {
          color: #e5e7eb;
          font-size: 0.98em;
          margin-bottom: 2px;
        }
        .compra-card .compra-info {
          font-size: 0.97em;
          color: #cbd5e1;
          margin-bottom: 2px;
        }
        .compra-card .compra-hora {
          font-size: 0.97em;
          color: #60a5fa;
          margin-bottom: 2px;
        }
        .compra-card .compra-direccion {
          font-size: 0.97em;
          color: #fbbf24;
          margin-bottom: 2px;
        }
        .compra-card .btn-recibido {
          background: #3b82f6;
          color: #fff;
          border: none;
          border-radius: 8px;
          padding: 8px 18px;
          font-size: 1em;
          font-family: 'Inter', sans-serif;
          font-weight: 600;
          margin-top: 8px;
          cursor: pointer;
          transition: background 0.18s;
          box-shadow: 0 2px 8px #3b82f655;
        }
        .compra-card .btn-recibido:hover {
          background: #2563eb;
        }
        @media (max-width: 700px) {
          #contenedor-pedidos-compras {
            flex-direction: column;
            gap: 14px;
          }
          .compra-card {
            min-width: 0;
            max-width: 98vw;
            padding: 12px 4vw 12px 4vw;
          }
        }
      `;
      document.head.appendChild(style);
    }
    pedidos.forEach((pedido, idx) => {
      const card = document.createElement('div');
      card.className = 'compra-card';
      card.innerHTML = `
        <div class="compra-titulo"><i class='fas fa-truck'></i> ${pedido.proveedor || 'Proveedor'}</div>
        <div class="compra-productos-box">
          <b>Productos:</b>
          <ul>
            ${(pedido.productos||[]).map(p => `<li>${p.nombre} <span style='color:#60a5fa;'>(x${p.cantidad})</span></li>`).join('')}
          </ul>
        </div>
        <div class="compra-hora"><i class='fas fa-clock'></i> ${(pedido.hora || pedido.horaEntrega || '')}</div>
        <button class="btn-recibido" data-idx="${idx}"><i class="fas fa-check"></i> Pedido Recibido</button>
      `;
      cont.appendChild(card);
    });
    // Botones funcionales
    cont.querySelectorAll('.btn-recibido').forEach(btn => {
      btn.addEventListener('click', function() {
        const idx = parseInt(this.getAttribute('data-idx'));
        if (isNaN(idx)) return;
        // 1. Obtener el pedido y eliminarlo del array
        const pedido = pedidos[idx];

        // Guardar en historialVentasFodexa
        let historial = [];
        try { historial = JSON.parse(localStorage.getItem('historialVentasFodexa') || '[]'); } catch(e) { historial = []; }
        const now = new Date();
        const fechaHora = now.toLocaleDateString('es-CO', {year:'numeric',month:'2-digit',day:'2-digit'}) + ' ' + now.toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        historial.push({
          id: 'venta_' + now.getTime(),
          fecha: fechaHora,
          proveedor: pedido.proveedor,
          direccion: pedido.direccion,
          horaEntrega: pedido.hora || pedido.horaEntrega || '',
          productos: (pedido.productos || []).map(p => ({ nombre: p.nombre, cantidad: p.cantidad }))
        });
        localStorage.setItem('historialVentasFodexa', JSON.stringify(historial));

        pedidos.splice(idx, 1);
        localStorage.setItem('pedidosComprasFodexa', JSON.stringify(pedidos));

        // 2. Sumar cantidades de productos al stock actual
        let stockMap = {};
        try { stockMap = JSON.parse(localStorage.getItem('stockInventarioFodexa') || '{}'); } catch(e) { stockMap = {}; }
        (pedido.productos || []).forEach(prod => {
          // Extraer cantidad numérica (ej: "5 kg" o "2 unidades")
          let cantidad = 0;
          if (typeof prod.cantidad === 'number') {
            cantidad = prod.cantidad;
          } else if (typeof prod.cantidad === 'string') {
            // Buscar primer número en la cadena
            const match = prod.cantidad.match(/([\d,.]+)/);
            if (match) cantidad = parseFloat(match[1].replace(',', '.'));
          }
          if (!cantidad || isNaN(cantidad)) return;
          // Sumar al stock existente
          const nombre = prod.nombre;
          stockMap[nombre] = (parseFloat(stockMap[nombre]) || 0) + cantidad;
        });
        localStorage.setItem('stockInventarioFodexa', JSON.stringify(stockMap));

        // 3. Mostrar mensaje breve de confirmación
        const alerta = document.createElement('div');
        alerta.textContent = 'Stock actualizado correctamente';
        alerta.style.position = 'fixed';
        alerta.style.top = '24px';
        alerta.style.left = '50%';
        alerta.style.transform = 'translateX(-50%)';
        alerta.style.background = '#22c55e';
        alerta.style.color = '#fff';
        alerta.style.padding = '12px 28px';
        alerta.style.borderRadius = '10px';
        alerta.style.fontSize = '1.08em';
        alerta.style.boxShadow = '0 2px 12px #0003';
        alerta.style.zIndex = 9999;
        document.body.appendChild(alerta);
        setTimeout(() => { alerta.remove(); }, 1600);

        // 4. Refrescar la vista de compras
        window.refrescarPedidosCompras();

        // 5. Si el usuario está en la sección inventario, refrescar inventario en pantalla
        const inventarioSection = document.getElementById('seccion-inventario');
        if (inventarioSection && !inventarioSection.classList.contains('hidden') && typeof window.mostrarInventario === 'function') {
          window.mostrarInventario('todos');
        }
      });
    });
  };

  // Mostrar pedidos de compras al cargar la sección Compras
  document.addEventListener('DOMContentLoaded', function() {
    const comprasSection = document.getElementById('seccion-compras');
    if (comprasSection) {
      // Si la sección ya está visible al cargar, mostrar pedidos
      if (!comprasSection.classList.contains('hidden') && typeof window.refrescarPedidosCompras === 'function') {
        window.refrescarPedidosCompras();
      }
      // También refrescar cada vez que se muestre la sección
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          if (m.attributeName === 'class') {
            if (!comprasSection.classList.contains('hidden') && typeof window.refrescarPedidosCompras === 'function') {
              window.refrescarPedidosCompras();
            }
          }
        });
      });
      observer.observe(comprasSection, { attributes: true });
    }
  });
})();
</script>
