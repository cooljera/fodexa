<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Productos</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="productos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="fodexa-wrapper">
    <aside class="sidebar sidebar-vertical">
      <div class="sidebar-logo">
        <h2>FODEXA</h2>
        <span>Productos</span>
      </div>
      <nav class="sidebar-menu">
        <ul>
          <li><button class="menu-btn active" data-section="categorias"><i class="fas fa-tags"></i> Categorías</button></li>
          <li><button class="menu-btn" data-section="productos"><i class="fas fa-box"></i> Productos</button></li>
        </ul>
      </nav>
    </aside>
    <main class="main-panel">
      <section id="seccion-categorias" class="seccion visible">
        <h2><i class="fas fa-tags"></i> Gestor de Categorías</h2>
        <form id="form-categoria" class="form-line">
          <input type="text" name="nombre" placeholder="Nombre de categoría" required>
          <button class="btn btn-primary" type="submit"><i class="fas fa-save"></i> Guardar</button>
        </form>
        <div id="categorias-container" class="lista-simple"></div>
      </section>
      <section id="seccion-productos" class="seccion hidden">
        <h2><i class="fas fa-box"></i> Gestor de Productos</h2>
        <form id="form-producto" class="form-line">
          <input type="text" name="nombre" placeholder="Nombre del producto" required>
          <input type="number" name="precio" placeholder="Precio" min="0" step="any" required>
          <select name="categoria"></select>
          <button class="btn btn-primary" type="submit"><i class="fas fa-save"></i> Guardar</button>
        </form>
        <div id="productos-container" class="lista-simple"></div>
      </section>
    </main>
  </div>
  <script src="productos.js"></script>
</body>
</html>
