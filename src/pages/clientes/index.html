<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos de Clientes - FODEXA</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="BaseClientes.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            line-height: 1.6;
            color: #1e293b;
        }
        
        #app {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- El contenido se cargará aquí desde BaseClientes.js -->
    </div>

    <!-- Incluir servicio de clientes sin ES6 modules -->
    <script src="../../services/clientesService-compatible.js"></script>
    
    <!-- Incluir BaseClientes sin ES6 modules -->
    <script src="BaseClientes-compatible.js"></script>
    
    <script>
        // Inicialización automática
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Inicializando BaseClientes desde HTML');
            
            // Crear instancia de BaseClientes
            if (typeof BaseClientes !== 'undefined') {
                window.baseClientes = new BaseClientes();
                console.log('✅ BaseClientes inicializado correctamente');
            } else {
                console.error('❌ BaseClientes no está disponible');
            }
        });
    </script>

    <script type="module">
        import BaseClientes from './BaseClientes.js';
        
        // La inicialización se hace automáticamente en el constructor
        console.log('🚀 BaseClientes cargado y inicializado');
    </script>
</body>
</html>
