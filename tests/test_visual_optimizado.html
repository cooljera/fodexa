<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Visual Optimizado - Búsqueda de Clientes</title>
    <link rel="stylesheet" href="ventas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .test-container {
            max-width: 400px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .test-title {
            text-align: center;
            color: #1e293b;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .debug-info {
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 12px;
            color: #64748b;
        }
        .test-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .test-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .test-btn.select {
            background: #10b981;
            color: white;
        }
        .test-btn.reset {
            background: #ef4444;
            color: white;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2 class="test-title">🔍 Test Visual Optimizado</h2>
        
        <!-- Sección de Cliente Optimizada -->
        <div class="cliente-section" id="cliente-section">
            <!-- Selector de cliente (estado inicial) -->
            <div class="cliente-selector" id="cliente-selector">
                <div class="search-cliente-container">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input 
                            type="text" 
                            id="search-cliente" 
                            class="search-cliente" 
                            placeholder="Buscar cliente por nombre o teléfono..."
                            oninput="buscarClienteCarrito(this.value)"
                        >
                    </div>
                    <button class="btn-nuevo-cliente" onclick="mostrarModalNuevoCliente()">
                        <i class="fas fa-user-plus"></i>
                        <span>Nuevo</span>
                    </button>
                    <div class="search-cliente-results hidden" id="search-cliente-results">
                        <!-- Resultados de búsqueda se mostrarán aquí -->
                    </div>
                </div>
            </div>
            
            <!-- Cliente seleccionado compacto -->
            <div class="cliente-seleccionado hidden" id="cliente-seleccionado">
                <div class="cliente-card-compact">
                    <div class="cliente-info-compact">
                        <div class="cliente-nombre-compact" id="cliente-nombre-display">-</div>
                        <div class="cliente-detalles-compact">
                            <span class="cliente-telefono-compact" id="cliente-telefono-display">-</span>
                        </div>
                    </div>
                    <div class="cliente-actions-compact">
                        <button class="btn-cambiar-cliente-compact" onclick="cambiarCliente()" title="Cambiar cliente">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-quitar-cliente-compact" onclick="quitarCliente()" title="Quitar cliente">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="debug-info">
            <strong>🎯 Mejoras Implementadas:</strong><br>
            ✅ Eliminado título "Cliente"<br>
            ✅ Buscador subido con márgenes mantenidos<br>
            ✅ Botón "Nuevo" reducido y reposicionado<br>
            ✅ Lista muestra 5+ clientes completos<br>
            ✅ Sección cliente minimizada al seleccionar<br>
            ✅ Z-index corregido (10000)
        </div>

        <div class="test-actions">
            <button class="test-btn select" onclick="testSeleccionCliente()">
                <i class="fas fa-user-check"></i> Test Selección
            </button>
            <button class="test-btn reset" onclick="testReset()">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>
    </div>

    <script>
        // Datos de prueba simplificados
        const clientesDemo = [
            {
                id: 1,
                nombre: 'María González Pérez',
                telefono: '+57 300 123 4567',
                tipo: 'vip'
            },
            {
                id: 2,
                nombre: 'Carlos Rodríguez Martín',
                telefono: '+57 301 987 6543',
                tipo: 'regular'
            },
            {
                id: 3,
                nombre: 'Ana Sofía Vargas',
                telefono: '+57 312 456 7890',
                direccion: 'Avenida 68 #25-15, Normandía',
                tipo: 'nuevo'
            },
            {
                id: 4,
                nombre: 'Luis Fernando Castro',
                telefono: '+57 315 789 0123',
                tipo: 'frecuente'
            },
            {
                id: 5,
                nombre: 'Patricia Morales Díaz',
                telefono: '+57 320 654 3210',
                direccion: 'Calle 45 #23-67, El Poblado',
                tipo: 'vip'
            },
            {
                id: 6,
                nombre: 'Jorge Alberto Mesa',
                telefono: '+57 310 111 2222',
                direccion: 'Carrera 70 #50-25, Laureles',
                tipo: 'regular'
            }
        ];

        let clienteSeleccionado = null;

        function buscarClienteCarrito(termino) {
            const resultsContainer = document.getElementById('search-cliente-results');
            
            if (!termino || !termino.trim()) {
                resultsContainer.classList.add('hidden');
                return;
            }
            
            const terminoLower = termino.toLowerCase();
            const clientesFiltrados = clientesDemo.filter(cliente =>
                cliente.nombre.toLowerCase().includes(terminoLower) ||
                cliente.telefono.includes(termino)
            );
            
            if (clientesFiltrados.length > 0) {
                resultsContainer.innerHTML = clientesFiltrados.map(cliente => `
                    <div class="cliente-result-item" onclick="seleccionarClienteCarrito(${cliente.id})">
                        <div class="cliente-result-info">
                            <div class="cliente-result-nombre">
                                ${cliente.nombre}
                                ${cliente.tipo === 'vip' ? '<span class="badge-vip"><i class="fas fa-crown"></i> VIP</span>' : ''}
                            </div>
                            <div class="cliente-result-detalles">
                                <div class="cliente-detalle-linea">
                                    <i class="fas fa-phone"></i>
                                    <span>${cliente.telefono}</span>
                                </div>
                                ${cliente.direccion ? `
                                    <div class="cliente-detalle-linea">
                                        <i class="fas fa-map-marker-alt"></i>
                                        <span>${cliente.direccion.length > 35 ? cliente.direccion.substring(0, 35) + '...' : cliente.direccion}</span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        <button class="cliente-result-action" onclick="event.stopPropagation(); seleccionarClienteCarrito(${cliente.id})">
                            <i class="fas fa-plus"></i>
                            Agregar
                        </button>
                    </div>
                `).join('');
                resultsContainer.classList.remove('hidden');
            } else {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <p>No se encontraron clientes</p>
                    </div>
                `;
                resultsContainer.classList.remove('hidden');
            }
        }

        function seleccionarClienteCarrito(clienteId) {
            const cliente = clientesDemo.find(c => c.id === clienteId);
            if (!cliente) return;
            
            clienteSeleccionado = cliente;
            mostrarClienteSeleccionado(cliente);
            
            // Limpiar búsqueda
            document.getElementById('search-cliente').value = '';
            document.getElementById('search-cliente-results').classList.add('hidden');
        }

        function mostrarClienteSeleccionado(cliente) {
            const selectorDiv = document.getElementById('cliente-selector');
            const seleccionadoDiv = document.getElementById('cliente-seleccionado');
            
            selectorDiv.classList.add('hidden');
            seleccionadoDiv.classList.remove('hidden');
            
            const nombreDisplay = document.getElementById('cliente-nombre-display');
            const telefonoDisplay = document.getElementById('cliente-telefono-display');
            
            if (nombreDisplay) {
                let nombreTexto = cliente.nombre;
                if (cliente.tipo === 'vip') {
                    nombreTexto += ' <span class="badge-vip"><i class="fas fa-crown"></i> VIP</span>';
                }
                nombreDisplay.innerHTML = nombreTexto;
            }
            
            if (telefonoDisplay) {
                telefonoDisplay.textContent = cliente.telefono;
            }
        }

        function cambiarCliente() {
            const selectorDiv = document.getElementById('cliente-selector');
            const seleccionadoDiv = document.getElementById('cliente-seleccionado');
            
            selectorDiv.classList.remove('hidden');
            seleccionadoDiv.classList.add('hidden');
            
            clienteSeleccionado = null;
            document.getElementById('search-cliente').focus();
        }

        function quitarCliente() {
            if (confirm('¿Quitar cliente de la venta?')) {
                cambiarCliente();
            }
        }

        function mostrarModalNuevoCliente() {
            alert('Modal de Nuevo Cliente (simulado)');
        }

        // Funciones de prueba
        function testSeleccionCliente() {
            // Simular selección del primer cliente VIP
            seleccionarClienteCarrito(1);
        }

        function testReset() {
            cambiarCliente();
            document.getElementById('search-cliente').value = '';
            document.getElementById('search-cliente-results').classList.add('hidden');
        }
    </script>
</body>
</html>
